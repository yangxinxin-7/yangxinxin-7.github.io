<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="icon" href="https://github.com/yangxinxin-7.png" type="image/png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050810;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #7c6ff7;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
    }

    /* animated bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124,111,247,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(5,8,16,0.7);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .nav-logo {
      font-weight: 700;
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    main {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    /* typography */
    h1, h2, h3, h4 { font-weight: 700; line-height: 1.3; }
    h1 { font-size: 2.2rem; margin-bottom: 1rem; }
    h2 { font-size: 1.5rem; margin: 2rem 0 0.8rem; }
    h3 { font-size: 1.2rem; margin: 1.5rem 0 0.6rem; }
    p { margin-bottom: 1rem; color: #cbd5e1; }
    a { color: var(--accent2); text-decoration: none; }
    a:hover { text-decoration: underline; }

    ul, ol { padding-left: 1.5rem; margin-bottom: 1rem; color: #cbd5e1; }
    li { margin-bottom: 0.3rem; }

    blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1rem;
      margin: 1.5rem 0;
      background: var(--surface);
      border-radius: 0 8px 8px 0;
      color: var(--muted);
    }

    code {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.85em;
      background: rgba(124,111,247,0.15);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: #c4b5fd;
    }

    pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    pre code {
      background: none;
      padding: 0;
      color: #e2e8f0;
      font-size: 0.875rem;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    img { max-width: 100%; border-radius: 10px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }
    th, td {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      text-align: left;
    }
    th { background: var(--surface); }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">{{ site.title }}</a>
    <div class="nav-links">
      <a href="/">文章</a>
      <a href="/about">关于</a>
      <a href="https://github.com/yangxinxin-7" target="_blank">GitHub</a>
    </div>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>
    © {{ site.time | date: "%Y" }} {{ site.author }}
  </footer>
</body>
</html>
