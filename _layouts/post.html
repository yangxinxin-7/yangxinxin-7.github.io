---
layout: default
---
<style>
  .post-header { margin-bottom: 2.5rem; }
  .post-header h1 {
    font-size: 2rem;
    background: linear-gradient(135deg, #fff 40%, #7c6ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.6rem;
  }
  .post-meta { color: #475569; font-size: 0.85rem; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: #7c6ff7;
    font-size: 0.85rem;
    margin-bottom: 2rem;
    text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }

  .toc {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 2rem;
  }
  .toc-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #475569;
    margin-bottom: 0.8rem;
  }
  .toc ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .toc li { margin: 0; }
  .toc a {
    display: block;
    padding: 0.25rem 0;
    color: #64748b;
    font-size: 0.875rem;
    text-decoration: none;
    transition: color 0.2s;
    border-left: 2px solid transparent;
    padding-left: 0.75rem;
  }
  .toc a:hover { color: #e2e8f0; text-decoration: none; }
  .toc a.active { color: #7c6ff7; border-left-color: #7c6ff7; }
  .toc .toc-h3 { padding-left: 1.75rem; font-size: 0.82rem; }

  .post-body { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 2rem; }
</style>

<a class="back-link" href="/">← 返回</a>

<div class="post-header">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">{{ page.date | date: "%Y年%m月%d日" }}</div>
</div>

<div class="toc">
  <div class="toc-title">目录</div>
  <ul id="toc-list"></ul>
</div>

<div class="post-body">
  {{ content }}
</div>

<script>
  // 给所有标题加 id，生成目录
  const body = document.querySelector('.post-body');
  const headings = body.querySelectorAll('h2, h3');
  const tocList = document.getElementById('toc-list');

  if (headings.length === 0) {
    document.querySelector('.toc').style.display = 'none';
  }

  headings.forEach((h, i) => {
    if (!h.id) {
      h.id = 'heading-' + i;
    }
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    if (h.tagName === 'H3') a.classList.add('toc-h3');
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth' });
      history.pushState(null, '', '#' + h.id);
    });
    li.appendChild(a);
    tocList.appendChild(li);
  });

  // 滚动高亮当前章节
  const links = tocList.querySelectorAll('a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = tocList.querySelector('a[href="#' + entry.target.id + '"]');
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '0px 0px -70% 0px' });

  headings.forEach(h => observer.observe(h));
</script>
