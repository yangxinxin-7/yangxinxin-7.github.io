---
layout: default
---
<style>
  .post-container {
    display: flex;
    gap: 2.5rem;
    align-items: flex-start;
  }

  /* 左侧目录 */
  .toc {
    position: sticky;
    top: 76px;
    width: 220px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 1.2rem;
  }
  .toc-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #475569;
    margin-bottom: 0.8rem;
  }
  .toc ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .toc li { margin: 0; }
  .toc a {
    display: block;
    padding: 0.28rem 0 0.28rem 0.75rem;
    color: #64748b;
    font-size: 0.82rem;
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    line-height: 1.4;
  }
  .toc a:hover { color: #e2e8f0; text-decoration: none; }
  .toc a.active { color: #7c6ff7; border-left-color: #7c6ff7; }
  .toc .toc-h3 { padding-left: 1.5rem; font-size: 0.78rem; }

  /* 右侧内容 */
  .post-content { flex: 1; min-width: 0; }
  .post-header { margin-bottom: 2.5rem; }
  .post-header h1 {
    font-size: 2rem;
    background: linear-gradient(135deg, #fff 40%, #7c6ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.6rem;
  }
  .post-meta { color: #475569; font-size: 0.85rem; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: #7c6ff7;
    font-size: 0.85rem;
    margin-bottom: 2rem;
    text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
  .post-body { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 2rem; }

  /* 窄屏隐藏左侧目录 */
  @media (max-width: 860px) {
    .toc { display: none; }
  }
</style>

<a class="back-link" href="/">← 返回</a>

<div class="post-container">
  <aside class="toc">
    <div class="toc-title">目录</div>
    <ul id="toc-list"></ul>
  </aside>

  <div class="post-content">
    <div class="post-header">
      <h1>{{ page.title }}</h1>
      <div class="post-meta">{{ page.date | date: "%Y年%m月%d日" }}</div>
    </div>
    <div class="post-body">
      {{ content }}
    </div>
  </div>
</div>

<script>
  const body = document.querySelector('.post-body');
  const headings = body.querySelectorAll('h2, h3');
  const tocList = document.getElementById('toc-list');

  if (headings.length === 0) {
    document.querySelector('.toc').style.display = 'none';
  }

  headings.forEach((h, i) => {
    if (!h.id) h.id = 'heading-' + i;
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    if (h.tagName === 'H3') a.classList.add('toc-h3');
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth' });
      history.pushState(null, '', '#' + h.id);
    });
    li.appendChild(a);
    tocList.appendChild(li);
  });

  const links = tocList.querySelectorAll('a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = tocList.querySelector('a[href="#' + entry.target.id + '"]');
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '0px 0px -70% 0px' });

  headings.forEach(h => observer.observe(h));
</script>
