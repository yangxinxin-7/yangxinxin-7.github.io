---
layout: default
---
<style>
  .post-header { margin-bottom: 2.5rem; }
  .post-header h1 {
    font-size: 2rem;
    background: linear-gradient(135deg, #fff 40%, #7c6ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.6rem;
  }
  .post-meta { color: #475569; font-size: 0.85rem; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: #7c6ff7;
    font-size: 0.85rem;
    margin-bottom: 2rem;
    text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
  .post-body { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 2rem; }
</style>

<a class="back-link" href="/">← 返回</a>

<div class="post-header">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">{{ page.date | date: "%Y年%m月%d日" }}</div>
</div>

<div class="post-body">
  {{ content }}
</div>
