<style>
  .page-header { margin-bottom: 2.5rem; }
  .page-header h1 {
    font-size: 2rem;
    background: linear-gradient(135deg, #fff 40%, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: #7c6ff7;
    font-size: 0.85rem;
    margin-bottom: 2rem;
    text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
  .page-body { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 2rem; }
</style>

<a class="back-link" href="/">← 返回</a>

<div class="page-header">
  <h1>{{ page.title }}</h1>
</div>

<div class="page-body">
  {{ content }}
</div>
