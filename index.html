<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yangxinxin-7 的主页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      padding: 60px 40px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #30363d;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .bio {
      color: #8b949e;
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      border-radius: 6px;
      border: 1px solid #30363d;
      color: #e6edf3;
      text-decoration: none;
      font-size: 0.9rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .links a:hover {
      border-color: #58a6ff;
      background: #161b22;
    }

    .footer {
      margin-top: 48px;
      color: #484f58;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://github.com/yangxinxin-7.png" alt="avatar">
    <h1>yangxinxin-7</h1>
    <p class="bio">欢迎来到我的主页</p>
    <div class="links">
      <a href="https://github.com/yangxinxin-7" target="_blank">
        GitHub
      </a>
    </div>
    <p class="footer">Built with GitHub Pages</p>
  </div>
</body>
</html>
